name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, cancel in-progress runs
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # A "<account>.github.io" repo is served at the root ("/"); any other repo
      # name is served at "/<repo>/". Detect that automatically.
      - name: Compute base path
        id: base
        run: |
          if [[ "${{ github.event.repository.name }}" == *.github.io ]]; then
            echo "url=/" >> "$GITHUB_OUTPUT"
          else
            echo "url=/${{ github.event.repository.name }}/" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate static site
        run: npm run generate
        env:
          NUXT_APP_BASE_URL: ${{ steps.base.outputs.url }}

      # Stop GitHub's Jekyll from stripping the _nuxt/ assets folder
      - run: touch .output/public/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
